_format_version: "3.0"

services:
  - name: usuarios-users-service
    url: http://usuarios_app:3001/users
    routes:
      - name: usuarios-route
        paths:
          - /api/usuarios
        strip_path: true

  - name: usuarios-auth-service
    url: http://usuarios_app:3001/auth
    routes:
      - name: auth-route
        paths:
          - /api/auth
        strip_path: true

  - name: usuarios-persons-service
    url: http://usuarios_app:3001/persons
    routes:
      - name: persons-route
        paths:
          - /api/persons
        strip_path: true

  - name: usuarios-persons-me-service
    url: http://usuarios_app:3001/persons/me
    routes:
      - name: persons-me-route
        paths:
          - /api/persons/me
        strip_path: true
        methods:
          - GET
          - PATCH

  - name: usuarios-roles-service
    url: http://usuarios_app:3001/roles
    routes:
      - name: roles-route
        paths:
          - /api/roles
        strip_path: true

  - name: usuarios-user-role-service
    url: http://usuarios_app:3001/user-role
    routes:
      - name: user-role-route
        paths:
          - /api/user-role
        strip_path: true

  - name: vehiculos-service
    url: http://vehiculos_app:3000/vehiculos
    routes:
      - name: vehiculos-route
        paths:
          - /api/vehiculos
        strip_path: true

  - name: zonas-service
    url: http://zonas:8080/api/v1/zonas
    routes:
      - name: zonas-route
        paths:
          - /api/zonas
        strip_path: true

  - name: espacios-service
    url: http://zonas:8080/api/v1/espacios
    routes:
      - name: espacios-route
        paths:
          - /api/espacios
        strip_path: true

  - name: zonas-swagger-service
    url: http://zonas:8080
    routes:
      - name: zonas-swagger-route
        paths:
          - /api/swagger/zonas
        strip_path: false

  - name: usuarios-docs-service
    url: http://usuarios_app:3001
    routes:
      - name: usuarios-docs-route
        paths:
          - /api/docs/usuarios
        strip_path: false

  - name: vehiculos-docs-service
    url: http://vehiculos_app:3000
    routes:
      - name: vehiculos-docs-route
        paths:
          - /api/docs/vehiculos
        strip_path: false

  - name: reservas-docs-service
    url: http://reservas_app:3002
    routes:
      - name: reservas-docs-route
        paths:
          - /api/docs/reservas
        strip_path: false

  - name: docs-hub-service
    url: http://docs_service:3003
    routes:
      - name: docs-hub-route
        paths:
          - /api/docs
        strip_path: true

  - name: tickets-service
    url: http://tickets_app:3004/tickets
    routes:
      - name: tickets-route
        paths:
          - /api/tickets
        strip_path: true

  - name: tickets-docs-service
    url: http://tickets_app:3004
    routes:
      - name: tickets-docs-route
        paths:
          - /api/docs/tickets
        strip_path: false

  - name: sse-service
    url: http://tickets_app:3004/sse
    routes:
      - name: sse-route
        paths:
          - /api/sse
        strip_path: true

  - name: audit-service
    url: http://ms_audit_app:3005/api/v1/audit
    routes:
      - name: audit-route
        paths:
          - /api/audit
        strip_path: true

  - name: reservas-asignaciones-service
    url: http://reservas_app:3002/asignaciones
    routes:
      - name: asignaciones-route
        paths:
          - /api/asignaciones
        strip_path: true

  - name: reservas-trazabilidad-service
    url: http://reservas_app:3002/trazabilidad
    routes:
      - name: trazabilidad-route
        paths:
          - /api/trazabilidad
        strip_path: true

  # ─── Rutas directas para Try it out de Swagger ───────────────
  - name: raw-usuarios-users
    url: http://usuarios_app:3001/users
    routes:
      - name: raw-usuarios-users-route
        paths:
          - /users
        strip_path: true

  - name: raw-usuarios-persons
    url: http://usuarios_app:3001/persons
    routes:
      - name: raw-usuarios-persons-route
        paths:
          - /persons
        strip_path: true

  - name: raw-usuarios-roles
    url: http://usuarios_app:3001/roles
    routes:
      - name: raw-usuarios-roles-route
        paths:
          - /roles
        strip_path: true

  - name: raw-usuarios-user-role
    url: http://usuarios_app:3001/user-role
    routes:
      - name: raw-usuarios-user-role-route
        paths:
          - /user-role
        strip_path: true

  - name: raw-usuarios-auth
    url: http://usuarios_app:3001/auth
    routes:
      - name: raw-usuarios-auth-route
        paths:
          - /auth
        strip_path: true

  - name: raw-usuarios-persons-me
    url: http://usuarios_app:3001
    routes:
      - name: raw-usuarios-persons-me-route
        paths:
          - /persons/me
        strip_path: false
        methods:
          - GET
          - PATCH

  - name: raw-usuarios-root
    url: http://usuarios_app:3001
    routes:
      - name: raw-usuarios-root-route
        paths:
          - /
        strip_path: false

  - name: raw-vehiculos
    url: http://vehiculos_app:3000/vehiculos
    routes:
      - name: raw-vehiculos-route
        paths:
          - /vehiculos
        strip_path: true

  - name: raw-tickets
    url: http://tickets_app:3004/tickets
    routes:
      - name: raw-tickets-route
        paths:
          - /tickets
        strip_path: true

  - name: raw-reservas-asignaciones
    url: http://reservas_app:3002/asignaciones
    routes:
      - name: raw-reservas-asignaciones-route
        paths:
          - /asignaciones
        strip_path: true

  - name: raw-reservas-trazabilidad
    url: http://reservas_app:3002/trazabilidad
    routes:
      - name: raw-reservas-trazabilidad-route
        paths:
          - /trazabilidad
        strip_path: true

  - name: raw-zonas-zonas
    url: http://zonas:8080/api/v1/zonas
    routes:
      - name: raw-zonas-zonas-route
        paths:
          - /api/v1/zonas
        strip_path: true

  - name: raw-zonas-espacios
    url: http://zonas:8080/api/v1/espacios
    routes:
      - name: raw-zonas-espacios-route
        paths:
          - /api/v1/espacios
        strip_path: true

plugins:
  - name: rate-limiting
    config:
      minute: 120
      policy: local
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
      headers:
        - Content-Type
        - Authorization
