version: '3.8'

services:
  # Base de datos unificada
  db_postgres:
    image: postgres:15
    container_name: postgres_data
    environment:
      POSTGRES_USER: ${DB_USER} 
      POSTGRES_PASSWORD: ${DB_PASSWORD} 
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-net

  # Microservicios
  vehiculos:
    build: ./vehiculos
    container_name: vehiculos_app
    ports:
      - "3000:3000"
    environment:
      PORT: 3000 
      DB_HOST: db_postgres
      DB_PORT: 5432
      DB_USUARIO: ${DB_USER}
      DB_CONTRASENA: ${DB_PASSWORD}
      DB_NOMBRE: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET:-mi_clave_super_secreta_2024_para_jwt!}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_QUEUE: audit_queue
      RABBITMQ_EXCHANGE: audit_exchange
      RABBITMQ_ROUTING_KEY: audit.event

    depends_on:
      - db_postgres
      - rabbitmq
    networks:
      - app-net

  usuarios:
    build: ./usuarios
    container_name: usuarios_app
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DB_HOST: db_postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: usuarios_db
      JWT_SECRET: ${JWT_SECRET:-mi_clave_super_secreta_2024_para_jwt!}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_QUEUE: audit_queue
      RABBITMQ_EXCHANGE: audit_exchange
      RABBITMQ_ROUTING_KEY: audit.event
    depends_on:
      - db_postgres
      - rabbitmq
    networks:
      - app-net

  zonas:
    build: ./zonas
    container_name: zonas_app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db_postgres:5432/zonas_db
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: ${JWT_SECRET:-mi_clave_super_secreta_2024_para_jwt!}
    depends_on:
      - db_postgres
    networks:
      - app-net

  reservas:
    build: ./reservas
    container_name: reservas_app
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      DB_HOST: db_postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: reservas_db
      VEHICULOS_API_URL: http://kong:8000/api/vehiculos
      JWT_SECRET: ${JWT_SECRET:-mi_clave_super_secreta_2024_para_jwt!}
    depends_on:
      - db_postgres
    networks:
      - app-net

  docs:
    build: ./docs-service
    container_name: docs_service
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
    networks:
      - app-net

  tickets:
    build: ./tickets
    container_name: tickets_app
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      DB_HOST: db_postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: tickets_db
      JWT_SECRET: ${JWT_SECRET:-mi_clave_super_secreta_2024_para_jwt!}
      VEHICULOS_API_URL: http://kong:8000/api/vehiculos
      USUARIOS_API_URL: http://kong:8000/api/usuarios
      ESPACIOS_API_URL: http://kong:8000/api/espacios
      SERVICE_JWT_TOKEN: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJlY2YwYzJhZS0yYzg1LTQxYjgtYjE1Ny00NmQ2N2Y0ZGQzMmQiLCJ1c2VybmFtZSI6ImFkbWluIiwicm9sZXMiOlsiY2xpZW50ZSIsImFkbWluIiwicmVjYXVkYWRvciIsInJvb3QiXSwiaWF0IjoxNzgzMzQ5OTA4LCJleHAiOjE3ODMzNTA4MDh9.KiHitgA_RSk-hAxoH05z6X28Y4Z96dihLyi4hFBXmlY
    depends_on:
      - db_postgres
    networks:
      - app-net

  kong:
    image: kong:latest
    container_name: kong_gateway
    environment:
      KONG_DATABASE: off
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8001:8001"
    volumes:
      - ./gateway/kong.yml:/usr/local/kong/declarative/kong.yml:ro
    depends_on:
      - vehiculos
      - usuarios
      - zonas
      - docs
      - tickets
    networks:
      - app-net

  # ─── RabbitMQ para auditoría ──────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq_audit
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - app-net

  # ─── Base de datos para ms-audit ──────────────────────────────
  audit-db:
    image: postgres:15
    container_name: postgres_audit
    environment:
      POSTGRES_USER: audit_user
      POSTGRES_PASSWORD: audit_pass
      POSTGRES_DB: audit_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_audit_data:/var/lib/postgresql/data
    networks:
      - app-net

  # ─── Microservicio de auditoría ───────────────────────────────
  audit:
    build: ./ms-audit
    container_name: ms_audit_app
    ports:
      - "3005:3005"
    environment:
      PORT: 3005
      DB_HOST: audit-db
      DB_PORT: 5432
      DB_USER: audit_user
      DB_PASSWORD: audit_pass
      DB_NAME: audit_db
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_QUEUE: audit_queue
      RABBITMQ_EXCHANGE: audit_exchange
      RABBITMQ_ROUTING_KEY: audit.event
    depends_on:
      - audit-db
      - rabbitmq
    networks:
      - app-net

volumes:
  postgres_data:
  postgres_audit_data:

networks:
  app-net: